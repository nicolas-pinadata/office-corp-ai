project:
  name: ""
  type: ""
  stage: ""
  stack: []

defaults:
  budget_mode: standard
  communication_mode: concise
  internal_language: english
  output_language: match_ceo
  max_agents: 2
  ask_clarifying_questions: only_when_blocked
  qa_threshold: medium_risk
  routing_mode: autonomous

context:
  project_brief: optional
  playbooks: optional
  decisions: optional
  current_state: recommended

output:
  include_agents_used: when_useful
  include_token_budget: true
  include_risks: when_relevant
  compression_rule: minimum_words_maximum_useful_signal
