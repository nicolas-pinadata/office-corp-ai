workspace:
  name: string
  type: string
  stage: string
  stack:
    - string
  path: optional

project:
  deprecated_alias_for: workspace
  supported_for_backward_compatibility: true

defaults:
  budget_mode: lean | standard | deep_work | audit
  communication_mode: normal | concise | compressed | executive
  internal_language: english
  output_language: match_ceo | explicit
  max_agents: number
  ask_clarifying_questions: only_when_blocked | always | never
  qa_threshold: low_risk | medium_risk | high_risk
  routing_mode: autonomous | direct_agent

context:
  workspace_docs: optional
  research: optional
  roadmap: optional
  architecture: optional
  ux: optional
  product: optional
  marketing: optional
  project_brief: optional
  playbooks: optional
  decisions: optional
  current_state: recommended

providers:
  workspace: local_filesystem | custom
  knowledge: markdown | custom
  memory: markdown | custom
  llm: current_runtime | custom
  interface: current_interface | custom

external_skill_packs:
  agent_skills:
    enabled: boolean
    path: optional
    auto_select: boolean
    fallback_to_officecorp_skills: boolean

output:
  include_agents_used: boolean
  include_token_budget: boolean
  include_risks: when_relevant | always | never
  include_work_receipt: lean_and_above | standard_and_above | deep_work_only | never
  include_validation_summary: when_multi_agent | when_risky | always | never
  disclose_execution_mode: boolean
  compression_rule: minimum_words_maximum_useful_signal

observability:
  execution_mode: simulated_multi_agent | executed_multi_agent | manual_workflow
  work_receipt_required: boolean
  decision_trace: off | optional | required_for_standard_and_above
  compare_against_single_llm: off | spot_check | benchmark
  log_agent_contribution_delta: boolean
